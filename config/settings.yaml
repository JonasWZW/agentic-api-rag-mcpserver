# Agentic API RAG MCP Server Configuration

server:
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "openai"
  model: "gpt-4"
  # Set via environment variable: OPENAI_API_KEY
  # api_key: "${OPENAI_API_KEY}"
  temperature: 0.7
  max_tokens: 2000

mcp:
  server_name: "agentic-api-rag"
  version: "1.0.0"

rag:
  vector_store: "chroma"
  embedding_model: "text-embedding-ada-002"
  chunk_size: 1000
  chunk_overlap: 200
  top_k: 5

kg:
  graph_type: "networkx"
  default_depth: 2
